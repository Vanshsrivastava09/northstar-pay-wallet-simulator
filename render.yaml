services:
  - type: web
    name: star-pay
    env: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    plan: free
    envVars:
      - key: SECRET_KEY
        value: replace-with-a-long-random-secret
      - key: DATABASE_URL
        value: sqlite:///./payment_gateway.db
      - key: COOKIE_SECURE
        value: false
      - key: CORS_ORIGINS
        value: https://star-pay.onrender.com
